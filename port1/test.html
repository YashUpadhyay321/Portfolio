<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Section</title>

    <!-- CSS for Owl Carousel -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="skills-section text-center">
        <div class="container">
            <h3 class="text-warning fw-bold">My Skills</h3>
            <div class="row mt-4 justify-content-center">
                <div class="owl-carousel owl-theme">
                    <div class="item"><div class="skill-card"><i class="fab fa-github"></i><p>GitHub</p></div></div>
                    <div class="item"><div class="skill-card"><i class="fab fa-js"></i><p>JavaScript</p></div></div>
                    <div class="item"><div class="skill-card"><i class="fab fa-html5"></i><p>HTML5</p></div></div>
                    <div class="item"><div class="skill-card"><i class="fab fa-css3-alt"></i><p>CSS3</p></div></div>
                    <div class="item"><div class="skill-card"><i class="fab fa-react"></i><p>React.js</p></div></div>
                    <div class="item"><div class="skill-card"><i class="fab fa-bootstrap"></i><p>Bootstrap</p></div></div>
                    <div class="item"><div class="skill-card"><i class="fas fa-database"></i><p>MySQL</p></div></div>
                    <div class="item"><div class="skill-card"><i class="fab fa-python"></i><p>Python</p></div></div>
                    <div class="item"><div class="skill-card"><i class="fab fa-php"></i><p>PHP</p></div></div>
                    <div class="item"><div class="skill-card"><i class="fas fa-code"></i><p>C</p></div></div>
                    <div class="item"><div class="skill-card"><i class="fas fa-code"></i><p>C++</p></div></div>
                    <div class="item"><div class="skill-card"><i class="fab fa-java"></i><p>Java</p></div></div>
                </div>
            </div>
        </div>
    </section>

    <!-- jQuery & Owl Carousel -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

    <!-- Owl Carousel Initialization -->
    <script>
        $(document).ready(function(){
            $(".owl-carousel").owlCarousel({
                loop: true,
                margin: 10,
                nav: true,
                responsive: {
                    0: { items: 2 },
                    600: { items: 3 },
                    1000: { items: 5 }
                }
            });
        });
    </script>

</body>
</html>
